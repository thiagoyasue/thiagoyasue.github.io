<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Amigles</title>

    <link rel="stylesheet" href="css/amigles.css">
</head>

<body>

    <h1>Amigles</h1>

    <p>Tente adivinhar o amigo (ou inimigo) do dia!</p>

<div class="pesquisa">

    <div class="autocomplete">

        <input
            id="inputPessoa"
            type="text"
            placeholder="Digite o nome de um amigo..."
            autocomplete="off">

        <div id="sugestoes" class="sugestoes"></div>

    </div>

    <button id="btnChutar">
        Chutar
    </button>

</div>

    <hr>

    <table id="tabelaResultados">

        <thead>
            <tr>
                <th>Nome</th>
                <th>Sexo</th>
                <th>Local</th>
                <th>Etnia</th>
                <th>Grupo</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

    <script src="js/pessoas.js"></script>
    <script src="js/amigles.js"></script>

</body>

</html>
